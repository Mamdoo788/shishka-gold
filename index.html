<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#080604"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Shishka Gold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────
    // Get this from: console.firebase.google.com → Project Settings → Your apps → Web app
    // ── FIREBASE CONFIG NOTE ─────────────────────────────────────────
    // The apiKey below is a PUBLIC project identifier — this is by design.
    // Firebase security is enforced via Security Rules, not by hiding this key.
    // See: firebase.google.com/docs/projects/api-keys
    // Restrict this key in Google Cloud Console → APIs → Credentials
    // to only allow: https://mamdoo788.github.io
    // ─────────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyBJlTHQJerjA6vntgAu3fLbWVP66M9SAQU",
      authDomain:        "shishka-gold.firebaseapp.com",
      projectId:         "shishka-gold",
      storageBucket:     "shishka-gold.firebasestorage.app",
      messagingSenderId: "223937935957",
      appId:             "1:223937935957:web:cad5aa7bbe1a891c3f72dc",
      measurementId:     "G-SCBLT49KXX"
    };
    // ─────────────────────────────────────────────────────────────────

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window._firebaseAuth     = auth;
    window._firebaseProvider = provider;
    window._firebaseSignIn   = () => signInWithPopup(auth, provider);
    window._firebaseSignOut  = () => signOut(auth);
    window._firebaseOnAuth   = (cb) => onAuthStateChanged(auth, cb);
    window._firebaseReady    = true;

    // Notify React once Firebase is ready
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{background:#080604;min-height:100%;overscroll-behavior:none;}
    :root{
      --gold:#E8B84B;--gold-lt:#FFD166;--gold-dk:#C49A2A;
      --white:#FFFFFF;--dim:#B8A888;--bg:#080604;
      --card:#131008;--card2:#1A1509;--bdr:#2E2208;
      --muted:#9A8560;--grn:#3DD68C;--amb:#F59E0B;--red:#F04F4F;
      --F-base:18px;
    }

    /* ── BASE ── */
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--white);font-size:var(--F-base);}
    .app{min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 96px;}

    /* ── HEADER ── */
    .hdr{padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:linear-gradient(180deg,#1A1008 0%,transparent 100%);}
    .brand{display:flex;align-items:center;gap:12px;}
    .bico{width:46px;height:46px;background:#000000;border:2px solid var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px #E8B84B66;flex-shrink:0;}
    .bname{font-size:22px;font-weight:800;color:var(--gold-lt);letter-spacing:.01em;}
    .bsub{font-size:13px;color:var(--muted);font-weight:600;margin-top:1px;line-height:1.6;}
    .bcredit{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.02em;}

    /* Status pill */
    .spill{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--bdr);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--dim);}
    .sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .sdot.live{background:var(--grn);box-shadow:0 0 8px var(--grn);}
    .sdot.loading{background:var(--gold);animation:bl .8s infinite;}
    .sdot.fallback{background:var(--amb);}
    .sdot.manual{background:#A78BFA;}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}

    /* ── SECTIONS ── */
    .sec{padding:16px 16px 0;}
    .stitle{font-size:13px;font-weight:800;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}

    /* ── PRICE CARD ── */
    .pcard{background:linear-gradient(145deg,#161008,#1E1509 50%,#161008);border:1px solid var(--bdr);border-radius:20px;padding:20px 20px 18px;position:relative;overflow:hidden;}
    .pcard::before{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;background:radial-gradient(circle,#E8B84B1A,transparent 60%);pointer-events:none;}

    /* Clock row */
    .clock-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .clock{font-size:13px;color:var(--muted);font-weight:600;}
    .clock span{color:var(--white);font-weight:700;}

    /* Price numbers */
    .price-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
    .plbl{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
    .pbig{font-size:34px;font-weight:800;color:var(--white);line-height:1;font-family:'Nunito',sans-serif;}
    .pbig.main{font-size:42px;}
    .punit{font-size:14px;color:var(--gold);font-weight:700;margin-left:3px;}

    /* Gram parity */
    .parity-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .parity-cell{background:#0A070366;border:1px solid var(--bdr);border-radius:12px;padding:12px 8px;text-align:center;}
    .parity-k{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:5px;letter-spacing:.04em;}
    .parity-v{font-size:19px;font-weight:800;color:var(--white);}

    .parity-lbl{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px;}

    /* Refresh button */
    .rbtn{margin-top:18px;width:100%;background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));color:#080604;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;padding:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 28px #E8B84B40;transition:transform .1s;}
    .rbtn:active{transform:scale(.98);}
    .rbtn:disabled{background:#2E2208;color:var(--muted);box-shadow:none;cursor:not-allowed;}

    /* Manual override */
    .otoggle{width:100%;background:var(--card);border:2.5px solid var(--gold-dk);border-radius:14px;color:var(--gold-lt);padding:16px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;text-align:center;margin-top:14px;letter-spacing:.01em;}
    .obox{background:var(--card);border:3px solid var(--gold);border-radius:16px;padding:20px;margin-top:10px;box-shadow:0 0 24px #E8B84B22;}
    .olbl{font-size:15px;color:var(--dim);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px;}
    .orow{display:flex;gap:10px;}
    .inp{flex:1;background:#0A0703;border:1.5px solid var(--bdr);color:var(--white);padding:15px 16px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:600;border-radius:12px;outline:none;-webkit-appearance:none;width:100%;transition:border-color .15s;}
    .inp:focus{border-color:var(--gold);}
    .inp::placeholder{color:var(--muted);}
    .sbtn{background:var(--gold-lt);color:#080604;border:none;border-radius:12px;padding:15px 20px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;white-space:nowrap;}
    .clrlnk{text-align:center;margin-top:14px;font-size:15px;color:var(--amb);cursor:pointer;text-decoration:underline;font-weight:700;}

    /* ── SCANNER CARD ── */
    .scard{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:22px 18px;}
    .fg{margin-bottom:16px;}
    .flbl{font-size:13px;color:var(--dim);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px;display:block;}

    /* Karat pills */
    .kpills{display:flex;gap:8px;direction:ltr;}
    .kpill{flex:1;padding:14px 6px;background:#0A0703;border:1.5px solid var(--bdr);border-radius:12px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;}
    .kpill.on{background:#221A06;border-color:var(--gold);color:var(--gold-lt);}

    /* Result rows */
    .dvdr{height:1px;background:var(--bdr);margin:18px 0;}
    .drow{padding:12px 0;border-bottom:1px solid #2E220830;}
    .drow:last-child{border-bottom:none;}
    .dlbl{font-size:12px;font-weight:700;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
    .dval{font-size:22px;font-weight:800;color:var(--white);}
    .dpg{font-size:16px;font-weight:700;color:var(--muted);margin-top:3px;}
    .rrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #2E220820;}
    .rrow:last-child{border-bottom:none;}
    .rlbl{font-size:15px;color:var(--dim);font-weight:600;}
    .rval{font-size:18px;font-weight:800;color:var(--white);}

    /* Section label inside scanner */
    .matrix-lbl{font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:18px 0 12px;}

    /* Sensitivity matrix */
    .matrix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .matrix-cell{background:#0A0703;border:1px solid var(--bdr);border-radius:12px;padding:14px 8px;text-align:center;}
    .matrix-pct{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;}
    .matrix-val{font-size:19px;font-weight:800;color:var(--gold-lt);}
    .matrix-note{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;font-weight:600;}
    .sph{text-align:center;padding:32px 0;color:var(--muted);font-size:15px;font-weight:600;}

    /* Verdict */
    .vrd{margin-top:18px;border-radius:16px;padding:22px;text-align:center;}
    .vrd.fair{background:#3DD68C12;border:2px solid #3DD68C44;}
    .vrd.okay{background:#F59E0B12;border:2px solid #F59E0B44;}
    .vrd.high{background:#F04F4F12;border:2px solid #F04F4F44;}
    .vrd.below{background:#FF00FF12;border:2px solid #FF006644;}
    .vrd.below .vrdttl{color:#FF4488;}
    .vrdico{font-size:42px;margin-bottom:10px;}
    .vrdttl{font-size:24px;font-weight:800;margin-bottom:8px;}
    .vrd.fair .vrdttl{color:#3DD68C;}.vrd.okay .vrdttl{color:#F59E0B;}.vrd.high .vrdttl{color:#F04F4F;}
    .vrddesc{font-size:15px;color:var(--dim);line-height:1.6;font-weight:600;}
    .vrdamt{margin-top:12px;font-size:15px;font-weight:700;color:var(--dim);}

    /* ── AUTH GATE ── */
    .auth-gate{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:44px 24px;text-align:center;margin:0 16px;}
    .auth-ico{font-size:56px;margin-bottom:18px;}
    .auth-ttl{font-size:26px;font-weight:800;color:var(--white);margin-bottom:12px;}
    .auth-desc{font-size:16px;color:var(--muted);font-weight:600;line-height:1.7;margin-bottom:30px;}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:#fff;color:#080604;border:none;border-radius:14px;padding:18px 20px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px #00000040;transition:transform .1s;}
    .google-btn:active{transform:scale(.97);}
    .google-btn:disabled{opacity:.6;cursor:not-allowed;}
    .google-btn svg{flex-shrink:0;}

    /* ── USER PILL ── */
    .user-pill{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--bdr);border-radius:20px;padding:6px 14px 6px 6px;cursor:pointer;}
    .user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
    .user-avatar-placeholder{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#080604;}
    .user-name{font-size:13px;font-weight:700;color:var(--dim);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* ── VAULT ── */
    .vsum{background:linear-gradient(135deg,#1A1008,#221609);border:1px solid var(--bdr);border-radius:18px;padding:20px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .slbl{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    .sval{font-size:24px;font-weight:800;color:var(--white);}
    .vcard{background:var(--card);border:1px solid var(--bdr);border-radius:20px;overflow:hidden;}
    .vhdr{padding:18px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
    .vttl{font-size:20px;font-weight:800;color:var(--white);}
    .vaddbtn{background:var(--gold);color:#080604;border:none;border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
    .vemp{padding:40px 18px;text-align:center;color:var(--muted);font-size:16px;font-weight:600;line-height:1.7;}
    .vempico{font-size:48px;margin-bottom:14px;}
    .vempadd{margin-top:16px;padding:14px 28px;background:var(--gold-lt);color:#080604;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;}
    .vitem{padding:16px 20px;border-bottom:1px solid #2E220820;}
    .vitem:last-child{border-bottom:none;}
    .vitop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .viname{font-size:17px;font-weight:700;color:var(--white);margin-bottom:4px;}
    .vikarat{font-size:13px;color:var(--gold-lt);font-weight:700;background:#E8B84B18;border:1px solid #E8B84B44;border-radius:6px;padding:3px 9px;}
    .virow{display:flex;justify-content:space-between;font-size:15px;color:var(--muted);font-weight:600;margin-top:6px;}
    .vival{color:var(--dim);font-weight:700;}
    .vrm{background:transparent;border:none;color:#4A3018;font-size:22px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .15s;}
    .vrm:hover{color:var(--red);}
    .zbadge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;font-weight:700;padding:5px 11px;border-radius:8px;}
    .zbadge.due{background:#E8B84B18;color:var(--gold-lt);border:1px solid #E8B84B44;}
    .zbadge.mat{background:#2E220844;color:var(--muted);border:1px solid var(--bdr);}
    .signout-btn{width:100%;margin-top:20px;background:transparent;border:1.5px solid var(--bdr);border-radius:14px;color:var(--muted);padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

    /* ── MODAL ── */
    .movrl{position:fixed;inset:0;background:#000000BB;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal{background:#161008;border:1px solid var(--bdr);border-top:2px solid var(--gold-dk);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;animation:sup .25s ease;}
    @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mttl{font-size:22px;font-weight:800;color:var(--white);margin-bottom:20px;}
    .mfld{margin-bottom:16px;}
    .mlbl{font-size:13px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:block;}
    .minp{width:100%;background:#0A0703;border:1.5px solid var(--bdr);color:var(--white);padding:15px 16px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:600;outline:none;-webkit-appearance:none;transition:border-color .15s;}
    .minp:focus{border-color:var(--gold);}
    .minp::placeholder{color:var(--muted);}
    .mrow{display:flex;gap:10px;}.mrow .mfld{flex:1;}
    .mbtns{display:flex;gap:10px;margin-top:20px;}
    .msave{flex:1;background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));color:#080604;border:none;border-radius:14px;padding:16px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;}
    .mcanc{background:transparent;border:1.5px solid var(--bdr);color:var(--muted);border-radius:14px;padding:16px 20px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}

    /* ── BOTTOM NAV ── */
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0C0804F8;border-top:1px solid var(--bdr);backdrop-filter:blur(20px);display:flex;padding:10px 12px 20px;gap:8px;z-index:100;}
    .nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;background:transparent;border:none;cursor:pointer;padding:8px 4px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);transition:color .15s,background .15s;position:relative;}
    .nbtn.on{color:var(--gold-lt);background:#E8B84B18;}
    .nico{font-size:24px;line-height:1;}
    .nlock{position:absolute;top:4px;right:8px;font-size:12px;}
    select.inp,select.minp{cursor:pointer;}
    select option{background:#080604;color:var(--white);}

    /* ── RTL SUPPORT ── */
    [dir="rtl"] { font-size:20px; }
    [dir="rtl"] .plbl { font-size:14px; }
    [dir="rtl"] .flbl { font-size:15px; }
    [dir="rtl"] .stitle { font-size:15px; }
    [dir="rtl"] .slbl { font-size:14px; }
    [dir="rtl"] .mlbl { font-size:15px; }
    [dir="rtl"] .clock { font-size:15px; }
    [dir="rtl"] .bsub { font-size:15px; }
    [dir="rtl"] .bcredit { font-size:13px; }
    [dir="rtl"] .rlbl { font-size:17px; }
    [dir="rtl"] .rval { font-size:20px; }
    [dir="rtl"] .nbtn { font-size:15px; }
    [dir="rtl"] .matrix-pct { font-size:14px; }
    [dir="rtl"] .matrix-val { font-size:21px; }
    [dir="rtl"] .matrix-note { font-size:13px; }
    [dir="rtl"] .vrddesc { font-size:17px; }
    [dir="rtl"] .vrdttl { font-size:26px; }
    [dir="rtl"] .viname { font-size:19px; }
    [dir="rtl"] .virow { font-size:17px; }
    [dir="rtl"] .zbadge { font-size:15px; }
    [dir="rtl"] .price-row{direction:ltr;} /* numbers always LTR */
    [dir="rtl"] .parity-row{direction:ltr;}
    [dir="rtl"] .matrix-grid{direction:ltr;}
    [dir="rtl"] .rrow{flex-direction:row-reverse;}
    [dir="rtl"] .clock-row{flex-direction:row-reverse;}
    [dir="rtl"] .vhdr{flex-direction:row-reverse;}
    [dir="rtl"] .vitop{flex-direction:row-reverse;}
    [dir="rtl"] .virow{flex-direction:row-reverse;}
    [dir="rtl"] .orow{flex-direction:row-reverse;}
    [dir="rtl"] .mbtns{flex-direction:row-reverse;}
    [dir="rtl"] .zbadge{flex-direction:row-reverse;}
    [dir="rtl"] .vsum{direction:ltr;} /* numbers LTR */
    [dir="rtl"] .sval{direction:ltr;text-align:right;}
    [dir="rtl"] .pbig{direction:ltr;text-align:right;}
    [dir="rtl"] .inp{text-align:right;}
    [dir="rtl"] .inp[type="number"]{text-align:left;direction:ltr;}
    [dir="rtl"] .minp[type="number"]{text-align:left;direction:ltr;}
    [dir="rtl"] .minp[type="date"]{text-align:left;direction:ltr;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── CONSTANTS ──────────────────────────────────────────────────────
const USD_SAR=3.75, TROY_G=31.1035, VAT=1.15, ZAKAT_R=0.025, ZAKAT_D=354;
const PURITY={"24K":1.0,"21K":0.875,"18K":0.75};
const FALLBACK=5000;

const ppg=(spot,k)=>(spot*USD_SAR/TROY_G)*PURITY[k]*VAT;
const fsar=n=>`﷼ ${n.toLocaleString("en-SA",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fsarShort=n=>n.toLocaleString("en-SA",{minimumFractionDigits:2,maximumFractionDigits:2});
const fusd=n=>`$${n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const f1=n=>typeof n==="number"?n.toFixed(1):"—";
const f0=n=>typeof n==="number"?Math.round(n).toLocaleString("en-SA"):"—";

// ── localStorage per UID ──────────────────────────────────────────

};

// ── PRICE FETCH — CORS-proxy cascade ─────────────────────────────
const CORS1="https://corsproxy.io/?";
const CORS2="https://api.allorigins.win/raw?url=";
const YF_URL="https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?interval=1m&range=1d";
const ML_URL="https://api.metals.live/v1/spot";

function parseYahoo(d){
  const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
  if(p&&p>1500&&p<9000) return parseFloat(p);
  throw new Error("invalid price");
}
function parseMetals(d){
  const arr=Array.isArray(d)?d:[d];
  const gold=arr.find(x=>x.gold!=null)?.gold;
  if(gold&&gold>1500&&gold<9000) return parseFloat(gold);
  throw new Error("invalid price");
}

async function tryDirect(){
  // metals.live is built for browser CORS
  const res=await fetch(ML_URL,{signal:AbortSignal.timeout(6000)});
  if(!res.ok) throw new Error("metals.live "+res.status);
  return parseMetals(await res.json());
}
async function tryProxy1Yahoo(){
  // corsproxy.io wrapping Yahoo Finance
  const res=await fetch(CORS1+YF_URL,{signal:AbortSignal.timeout(8000)});
  if(!res.ok) throw new Error("proxy1yahoo "+res.status);
  return parseYahoo(await res.json());
}
async function tryProxy2Metals(){
  // allorigins wrapping metals.live
  const res=await fetch(CORS2+encodeURIComponent(ML_URL),{signal:AbortSignal.timeout(8000)});
  if(!res.ok) throw new Error("proxy2metals "+res.status);
  return parseMetals(await res.json());
}
async function tryProxy1Metals(){
  // corsproxy.io wrapping metals.live
  const res=await fetch(CORS1+ML_URL,{signal:AbortSignal.timeout(8000)});
  if(!res.ok) throw new Error("proxy1metals "+res.status);
  return parseMetals(await res.json());
}

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("main");
  const [lang,setLang]=useState(()=>localStorage.getItem('shishka_lang')||'ar');
  const t=T[lang];
  const [moreTab,setMoreTab]=useState("vault");

  // Price state
  const [spot,setSpot]=useState(null);
  const [status,setStatus]=useState("loading");
  const [source,setSource]=useState(null);
  const [clockStr,setClockStr]=useState("");
  const [showOvr,setShowOvr]=useState(false);
  const [ovrIn,setOvrIn]=useState("");

  // Scanner state
  const [scanK,setScanK]=useState("21K");
  const [scanP,setScanP]=useState("");
  const [scanG,setScanG]=useState("");

  // Auth state
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [signingIn,setSigningIn]=useState(false);
  const [fbReady,setFbReady]=useState(!!window._firebaseReady);

  // Vault state (loaded per user)
  const [vault,setVaultState]=useState([]);
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({name:"",karat:"21K",grams:"",date:"",paid:""});
  const clockRef=useRef(null);

  // Vault write helper — persists to localStorage
  const setVault=(updater)=>{
    setVaultState(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      if(user?.uid) saveVault(user.uid,next);
      return next;
    });
  };

  // Wait for Firebase SDK module to load
  useEffect(()=>{
    if(window._firebaseReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("firebase-ready",h);
    return()=>window.removeEventListener("firebase-ready",h);
  },[]);

  // Auth listener — once Firebase ready
  useEffect(()=>{
    if(!fbReady||!window._firebaseOnAuth) return;
    const unsub=window._firebaseOnAuth((u)=>{
      setUser(u);
      setAuthLoading(false);
      if(u?.uid){
        setVaultState(loadVault(u.uid));
      } else {
        setVaultState([]);
      }
    });
    return unsub;
  },[fbReady]);

  // Clock
  useEffect(()=>{
    const tick=()=>{
      const now=new Date();
      setClockStr(now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    };
    tick();
    clockRef.current=setInterval(tick,1000);
    return()=>clearInterval(clockRef.current);
  },[]);

  // Price fetch
  const fetchPrice=useCallback(async()=>{
    setStatus("loading");
    const sources=[
      ["Direct metals.live", tryDirect],
      ["Proxy → Yahoo Finance", tryProxy1Yahoo],
      ["Proxy → metals.live (allorigins)", tryProxy2Metals],
      ["Proxy → metals.live (corsproxy)", tryProxy1Metals],
    ];
    for(const [label,fn] of sources){
      try{
        const p=await fn();
        console.log("✅ Price from:",label,p);
        setSpot(p);setStatus("live");setSource(label);
        return;
      }catch(e){
        console.warn("❌",label,"→",e.message);
      }
    }
    console.error("All 4 sources failed — using anchor fallback");
    setStatus("fallback");setSource("Estimated");
  },[]);

  useEffect(()=>{fetchPrice();},[fetchPrice]);

  // Auto-refresh every 60 seconds
  useEffect(()=>{
    const id=setInterval(()=>{
      // Only auto-refresh if not manually overridden
      if(status!=="manual") fetchPrice();
    },60000);
    return()=>clearInterval(id);
  },[fetchPrice,status]);

  const eff=spot||FALLBACK;
  const today=new Date();

  const applyOvr=()=>{
    const v=parseFloat(ovrIn);
    if(isNaN(v)||v<1000||v>9999)return;
    setSpot(v);setStatus("manual");setSource("Manual");setShowOvr(false);
  };

  // Scanner
  const scanPN=parseFloat(scanP), scanGN=parseFloat(scanG);
  const hasOffer=!isNaN(scanPN)&&scanPN>0;
  const hasWeight=!isNaN(scanGN)&&scanGN>0;
  const fairV=hasWeight&&hasOffer?ppg(eff,scanK)*scanGN:null;
  const mAmt=fairV!=null?scanPN-fairV:null;
  const mPct=(fairV!=null&&fairV>0)?((scanPN-fairV)/fairV)*100:null;
  // Verdict logic — karat-aware
  const getVerdict=(pct,karat)=>{
    if(pct===null) return null;
    if(pct<0) return "below";
    if(karat==="24K"){
      if(pct<=2) return "24spot";
      if(pct<=8) return "24light";
      return "24over";
    }
    // 21K and 18K jewelry rules
    if(pct<=5)  return "cheap";
    if(pct<=15) return "fair";
    if(pct<=30) return "neg";
    return "walkaway";
  };
  const vrd=getVerdict(mPct,scanK);

  // Vault calcs
  const vc=vault.map(p=>{
    const fmv=ppg(eff,p.karat)*p.grams;
    const days=Math.floor((today-new Date(p.date))/86400000);
    const pnl=fmv-p.paid;
    return{...p,fmv,days,pnl,eli:days>=ZAKAT_D};
  });
  const tFmv=vc.reduce((s,p)=>s+p.fmv,0);
  const tPnl=vc.reduce((s,p)=>s+p.pnl,0);
  const zDue=vc.filter(p=>p.eli).reduce((s,p)=>s+p.fmv,0)*ZAKAT_R;

  const addItem=()=>{
    const{name,karat,grams,date,paid}=form;
    if(!name||!grams||!date||!paid)return;
    setVault(v=>[...v,{name,karat,grams:parseFloat(grams),date,paid:parseFloat(paid)}]);
    setForm({name:"",karat:"21K",grams:"",date:"",paid:""});setShowModal(false);
  };

  const handleSignIn=async()=>{
    if(!window._firebaseSignIn)return;
    setSigningIn(true);
    try{await window._firebaseSignIn();}
    catch(e){console.error("sign in",e);}
    finally{setSigningIn(false);}
  };

  const handleSignOut=async()=>{
    if(!window._firebaseSignOut)return;
    await window._firebaseSignOut();
    setVaultState([]);
  };

  // ── AUTH GATE component ────────────────────────────────────────────
  const AuthGate=({feature})=>(
    <div className="sec" style={{paddingTop:32}}>
      <div className="auth-gate">
        <div className="auth-ico">🔐</div>
        <div className="auth-ttl">{t.signIn}</div>
        <div className="auth-desc">{t.vaultDesc}</div>
        <button className="google-btn" onClick={handleSignIn} disabled={signingIn||!fbReady}>
          <GoogleLogo/>
          {signingIn?t.signingIn:!fbReady?"Loading…":t.signIn}
        </button>
        {!fbReady&&<p style={{marginTop:12,fontSize:11,color:"var(--muted)",textAlign:"center"}}>
          ⚠️ Firebase not configured yet. Add your Firebase config to the HTML file.
        </p>}
      </div>
    </div>
  );

  // ── User pill for header ───────────────────────────────────────
  const UserPill=()=>{
    if(authLoading) return null;
    if(!user) return null;
    const name=user.displayName?.split(" ")[0]||"User";
    return(
      <button className="user-pill" onClick={handleSignOut} title="Tap to sign out">
        {user.photoURL
          ?<img className="user-avatar" src={user.photoURL} alt={name}/>
          :<div className="user-avatar-placeholder">{name[0].toUpperCase()}</div>
        }
        <span className="user-name">{name}</span>
      </button>
    );
  };

  return(
    <div className="app" dir={lang==="ar"?"rtl":"ltr"} style={{fontFamily:"'Nunito',sans-serif"}}>

      {/* HEADER */}
      <div className="hdr">
        <div className="brand">
          <div className="bico"><GoldBar/></div>
          <div>
            <div className="bname" style={{fontFamily:"'Nunito',sans-serif",direction:"ltr"}}>Shishka Gold</div>
            <div className="bsub">{t.subtitle}<br/><span className="bcredit">{t.credit}</span></div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setLang(l=>l==="en"?"ar":"en")} style={{
            background:"var(--card2)",border:"1.5px solid var(--gold-dk)",borderRadius:20,
            color:"var(--gold-lt)",padding:"7px 14px",fontFamily:"'Nunito',sans-serif",
            fontSize:14,fontWeight:800,cursor:"pointer"
          }}>{lang==="en"?"ع":"EN"}</button>
          {user
            ?<UserPill/>
            :<div className="spill">
            <div className={`sdot ${status}`}/>
            <span>{status==="loading"?t.loading:source}</span>
          </div>
          }
        </div>
      </div>

      {/* ── MAIN PAGE: PRICE + SCANNER ── */}
      {page==="main"&&<>
        <div className="sec">
          <div className="pcard">
            <div className="clock-row">
              <span className="clock">{t.updated} <span>{clockStr}</span></span>
              {status==="fallback"&&<span style={{fontSize:13,color:"var(--amb)",fontWeight:700}}>⚠ {t.estimated}</span>}
              {status==="manual"&&<span style={{fontSize:13,color:"#A78BFA",fontWeight:700}}>✏ {t.manual}</span>}
            </div>
            <div className="price-row">
              <div>
                <div className="plbl">{t.spotUSD}</div>
                <div className="pbig main">
                  {status==="loading"?<span style={{fontSize:26,color:"var(--muted)"}}>…</span>
                  :<span>{fusd(eff)}<span className="punit">/ oz</span></span>}
                </div>
              </div>
              <div>
                <div className="plbl">{t.spotSAR}</div>
                <div className="pbig" style={{fontSize:32}}>
                  {status==="loading"?<span style={{fontSize:22,color:"var(--muted)"}}>…</span>
                  :<span>{Math.round(eff*USD_SAR).toLocaleString("en-SA")}<span className="punit">/ oz</span></span>}
                </div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div className="plbl" style={{marginBottom:8}}>{t.gramParity}</div>
              <div className="parity-row">
                {["24K","21K","18K"].map((k,i)=>(
                  <div key={k} className="parity-cell">
                    <div className="parity-k">{k}</div>
                    <div className="parity-v">{f0(ppg(eff,k))}</div>
                    <div className="parity-lbl">{t.perGram}</div>
                  </div>
                ))}
              </div>
            </div>
            <button className="rbtn" onClick={fetchPrice} disabled={status==="loading"}>
              <span>{status==="loading"?"⏳":"🔄"}</span>
              {status==="loading"?t.loading:t.refresh}
            </button>
          </div>
        </div>
        <div className="sec" style={{paddingBottom:8}}>
          <button className="otoggle" onClick={()=>setShowOvr(s=>!s)}>
            {showOvr?"▲ "+t.hideManual:"✏️  "+t.setManual}
          </button>
          {showOvr&&<div className="obox">
            <div className="olbl">{t.usdPerOz}</div>
            <div className="orow">
              <input className="inp" type="number" inputMode="decimal"
                placeholder="e.g. 3280" value={ovrIn}
                onChange={e=>setOvrIn(e.target.value)}/>
              <button className="sbtn" onClick={applyOvr}>{t.set}</button>
            </div>
            {status==="manual"&&<div className="clrlnk"
              onClick={()=>{setSpot(null);setStatus("fallback");setSource("Estimated");setOvrIn("");setShowOvr(false);}}>
              {t.clearAuto}
            </div>}
          </div>}
        </div>


        {/* ── THE SCANNER ── */}
        <div className="sec" style={{paddingBottom:8}}>
          <div className="stitle" style={{marginBottom:14}}>{t.scanner}</div>
          <div className="scard">
          <div className="fg">
            <span className="flbl">{t.purity}</span>
            <div className="kpills">
              {["24K","21K","18K"].map(k=>(
                <button key={k} className={`kpill${scanK===k?" on":""}`}
                  onClick={()=>setScanK(k)}>{k}</button>
              ))}
            </div>
          </div>
          <div className="fg">
            <label className="flbl">{t.weight}</label>
            <input className="inp" type="number" inputMode="decimal"
              placeholder="e.g. 15.5" value={scanG}
              onChange={e=>setScanG(e.target.value)} style={{width:"100%"}}/>
          </div>
          <div className="fg">
            <label className="flbl">{t.offer}</label>
            <input className="inp" type="number" inputMode="decimal"
              placeholder="e.g. 8500" value={scanP}
              onChange={e=>setScanP(e.target.value)} style={{width:"100%"}}/>
          </div>

          {hasWeight?<>
            <div className="dvdr"/>
            {/* Quote De-Layering */}
            <div className="matrix-lbl" style={{marginTop:0}}>{t.deLayer}</div>

            {/* Base Price — total */}
            <div className="drow">
              <div className="dlbl">{t.basePrice}</div>
              <div className="dval" style={{color:"var(--gold-lt)"}}>﷼ {f0(ppg(eff,scanK)*scanGN)}</div>
              <div className="dpg">﷼ {f0(ppg(eff,scanK))}{lang==="ar"?"/جرام":"/g"}</div>
            </div>

            {hasOffer&&mAmt!=null&&<>
              {/* Markup — total + per gram */}
              <div className="drow">
                <div className="dlbl">{t.markup}</div>
                <div className="dval" style={{color:mAmt>0?"var(--red)":"var(--grn)"}}>
                  {mAmt>=0?"+":""}﷼ {f0(mAmt)}
                </div>
                <div className="dpg" style={{color:mAmt>0?"var(--red)":"var(--grn)"}}>
                  {mAmt>=0?"+":""}﷼ {f0(mAmt/scanGN)}{lang==="ar"?"/جرام":"/g"}
                </div>
              </div>

              {/* Effective Margin % */}
              <div className="drow">
                <div className="dlbl">{t.margin}</div>
                <div className="dval" style={{color:mPct>30?"var(--red)":mPct>15?"var(--amb)":mPct<5?"var(--amb)":"var(--grn)"}}>
                  {mPct>=0?"+":""}{f1(mPct)}%
                </div>
              </div>
            </>}

            {/* Sensitivity Matrix */}
            <div className="matrix-lbl">{t.matrix}</div>
            <div className="matrix-grid">
              {[10,20,30].map(m=>(
                <div key={m} className="matrix-cell">
                  <div className="matrix-pct">{m}%</div>
                  <div className="matrix-val">﷼ {f0(ppg(eff,scanK)*scanGN*(1+m/100))}</div>
                  <div className="matrix-val" style={{fontSize:14,marginTop:4}}>
                    ﷼ {f0(ppg(eff,scanK)*(1+m/100))}{lang==="ar"?"/جرام":"/g"}
                  </div>
                </div>
              ))}
            </div>
            <div className="matrix-note">{t.vatNote}</div>

            {/* Verdict — karat-aware */}
            {hasOffer&&vrd&&(()=>{
              const vrdMap={
                "below": {cls:"below", ico:"🚨", title:t.vrdBelowTitle, desc:t.vrdBelowDesc},
                "24spot":{cls:"fair",  ico:"✅", title:t.vrd24SpotTitle, desc:t.vrd24SpotDesc},
                "24light":{cls:"okay", ico:"⚠️", title:t.vrd24LightTitle,desc:t.vrd24LightDesc(f1(mPct))},
                "24over":{cls:"high",  ico:"❌", title:t.vrd24OverTitle, desc:t.vrd24OverDesc(f1(mPct))},
                "cheap": {cls:"below", ico:"🚨", title:t.vrdCheapTitle,  desc:t.vrdCheapDesc},
                "fair":  {cls:"fair",  ico:"✅", title:t.vrdFairTitle,   desc:t.vrdFairDesc(f1(mPct))},
                "neg":   {cls:"okay",  ico:"🔶", title:t.vrdNegTitle,    desc:t.vrdNegDesc(f1(mPct))},
                "walkaway":{cls:"high",ico:"❌", title:t.vrdHighTitle,   desc:t.vrdHighDesc(f1(mPct))},
              };
              const v=vrdMap[vrd]||vrdMap["fair"];
              return(
                <div className={`vrd ${v.cls}`} style={{marginTop:16}}>
                  <div className="vrdico">{v.ico}</div>
                  <div className="vrdttl">{v.title}</div>
                  <div className="vrddesc">{v.desc}</div>
                  {mAmt!=null&&<div className="vrdamt">{t.extraPaid("﷼ "+f0(Math.abs(mAmt)))}</div>}

                </div>
              );
            })()}
          </>:<div className="sph">{t.enterWeight}</div>}
          </div>
        </div>
      </>}

      {/* ── MORE PAGE ── */}
      {page==="more"&&<div style={{paddingTop:18}}>

        {/* Sub-tab switcher */}
        <div style={{display:"flex",gap:10,padding:"0 16px",marginBottom:18}}>
          {[["vault","📦 "+t.myGold],["zakat","🌙 "+t.zakat]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setMoreTab(id)} style={{
              flex:1,padding:"13px 8px",
              background:moreTab===id?"#2A1C08":"var(--card)",
              border:`1px solid ${moreTab===id?"var(--gold)":"var(--bdr)"}`,
              borderRadius:12,fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:700,
              color:moreTab===id?"var(--gold-lt)":"var(--muted)",cursor:"pointer"
            }}>{lbl}</button>
          ))}
        </div>

        {/* VAULT — gated */}
        {moreTab==="vault"&&<>
          {!user
            ?<AuthGate feature={t.vaultFeature}/>
            :<div className="sec" style={{paddingTop:0}}>
              {vault.length>0&&<div className="vsum">
                <div><div className="slbl">{t.totalValue}</div><div className="sval">{fsar(tFmv)}</div></div>
                <div>
                  <div className="slbl">{tPnl>=0?t.profit:t.loss}</div>
                  <div className="sval" style={{color:tPnl>=0?"var(--grn)":"var(--red)"}}>
                    {tFmv>0?(tPnl>=0?"+":"")+((tPnl/vc.reduce((s,p)=>s+p.paid,0))*100).toFixed(1)+"%":"—"}
                  </div>
                </div>
              </div>}
              <div className="vcard">
                <div className="vhdr">
                  <div className="vttl">{t.myGold}</div>
                  <button className="vaddbtn" onClick={()=>setShowModal(true)}>+ {t.addItem}</button>
                </div>
                {vault.length===0
                  ?<div className="vemp">
                    <div className="vempico">🏺</div>
                    <div style={{color:"var(--cdim)",fontWeight:600}}>{t.noItems}</div>
                    <div style={{marginTop:6}}>{t.addFirst}</div>
                    <button className="vempadd" onClick={()=>setShowModal(true)}>{t.addItem}</button>
                  </div>
                  :vc.map((p,i)=>(
                    <div key={i} className="vitem">
                      <div className="vitop">
                        <div><div className="viname">{p.name}</div><span className="vikarat">{p.karat} · {p.grams}g · {(PURITY[p.karat]*100).toFixed(1)}% pure</span></div>
                        <button className="vrm" onClick={()=>setVault(v=>v.filter((_,j)=>j!==i))}>×</button>
                      </div>
                      <div className="virow"><span>{t.totalValue}</span><span className="vival" style={{color:"var(--gold-lt)"}}>{fsar(p.fmv)}</span></div>
                      <div className="virow">
                        <span>{p.pnl>=0?t.profit:t.loss}</span>
                        <span className="vival" style={{color:p.pnl>=0?"var(--grn)":"var(--red)"}}>
                          {p.paid>0?(p.pnl>=0?"+":"")+((p.pnl/p.paid)*100).toFixed(1)+"%":"—"}
                        </span>
                      </div>
                    </div>
                  ))
                }
              </div>
              <button className="signout-btn" onClick={handleSignOut}>🚪 {t.signOut}</button>
            </div>
          }
        </>}

        {/* ZAKAT — gated */}
        {moreTab==="zakat"&&<>
          {!user
            ?<AuthGate feature={t.zakatFeature}/>
            :<div className="sec" style={{paddingTop:0}}>
              <div className="vcard">
                <div className="vhdr"><div className="vttl">{t.zakat}</div></div>
                {vault.length===0
                  ?<div className="vemp">
                    <div className="vempico">🌙</div>
                    <div style={{color:"var(--cdim)",fontWeight:600}}>{t.noItems}</div>
                    <div style={{marginTop:6}}>{t.addFirst}</div>
                    <button className="vempadd" onClick={()=>setMoreTab("vault")}>{t.myGold}</button>
                  </div>
                  :<>
                    {zDue>0&&<div style={{margin:"16px 18px 4px",padding:16,background:"#E8B84B14",border:"1px solid #E8B84B33",borderRadius:12,textAlign:"center"}}>
                      <div style={{fontSize:13,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>{t.totalZakat}</div>
                      <div style={{fontFamily:"'Nunito',sans-serif",fontSize:32,fontWeight:900,color:"var(--gold-lt)"}}>{fsar(zDue)}</div>
                      <div style={{fontSize:12,color:"var(--muted)",marginTop:4,fontWeight:500}}>2.5% of eligible holdings · AAOIFI standard · {ZAKAT_D} day Hijri cycle</div>
                    </div>}
                    {vc.map((p,i)=>(
                      <div key={i} className="vitem">
                        <div className="vitop"><div><div className="viname">{p.name}</div><span className="vikarat">{p.karat} · {p.grams}g · {(PURITY[p.karat]*100).toFixed(1)}% pure</span></div></div>
                        <div className="virow"><span>{t.daysHeld}</span><span className="vival">{p.days} days</span></div>
                        <div className="virow"><span style={{color:"var(--gold)",fontSize:12}}>
                          {p.karat} = {(PURITY[p.karat]*100).toFixed(1)}% pure · FMV = ppg × {p.grams}g
                        </span></div>
                        <div className="virow"><span>{t.totalValue}</span><span className="vival">{fsar(p.fmv)}</span></div>
                        {p.eli&&<div className="virow" style={{borderTop:"1px dashed var(--bdr)",paddingTop:8,marginTop:4}}>
                          <span style={{color:"var(--gold-lt)",fontWeight:700}}>Zakat = FMV × 2.5%</span>
                          <span className="vival" style={{color:"var(--gold-lt)"}}>{fsar(p.fmv*ZAKAT_R)}</span>
                        </div>}
                        <div>
                          {p.eli
                            ?<span className="zbadge due">🌙 {t.zakatDue} — {fsar(p.fmv*ZAKAT_R)}</span>
                            :<span className="zbadge mat">⏳ {t.maturing} · {ZAKAT_D-p.days}</span>
                          }
                        </div>
                      </div>
                    ))}
                  </>
                }
              </div>
            </div>
          }
        </>}
      </div>}

      {/* BOTTOM NAV */}
      <div className="bnav">
        {[
          ["main","💰",lang==="ar"?"السعر والفاحص":"Price & Scanner",false],
          ["more","⋯",t.vaultTab,!user]
        ].map(([id,ico,lbl,locked])=>(
          <button key={id} className={`nbtn${page===id?" on":""}`} onClick={()=>setPage(id)}>
            <span className="nico">{ico}</span>
            <span>{lbl}</span>
            {locked&&<span className="nlock">🔒</span>}
          </button>
        ))}
      </div>

      {/* ADD ITEM MODAL */}
      {showModal&&<div className="movrl" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
        <div className="modal">
          <div className="mttl">{t.addItem}</div>
          <div className="mfld">
            <label className="mlbl">{t.itemName}</label>
            <input className="minp" type="text" placeholder="e.g. Gold Bracelet"
              value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          </div>
          <div className="mrow">
            <div className="mfld">
              <label className="mlbl">{t.goldType}</label>
              <select className="minp" value={form.karat} onChange={e=>setForm(f=>({...f,karat:e.target.value}))}>
                <option>24K</option><option>21K</option><option>18K</option>
              </select>
            </div>
            <div className="mfld">
              <label className="mlbl">{t.weightG}</label>
              <input className="minp" type="number" inputMode="decimal" placeholder="15.5"
                value={form.grams} onChange={e=>setForm(f=>({...f,grams:e.target.value}))}/>
            </div>
          </div>
          <div className="mfld">
            <label className="mlbl">{t.datePurchased}</label>
            <input className="minp" type="date" value={form.date}
              onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
          </div>
          <div className="mfld">
            <label className="mlbl">{t.totalPaidSAR}</label>
            <input className="minp" type="number" inputMode="decimal" placeholder="e.g. 4800"
              value={form.paid} onChange={e=>setForm(f=>({...f,paid:e.target.value}))}/>
          </div>
          <div className="mbtns">
            <button className="mcanc" onClick={()=>setShowModal(false)}>{t.cancel}</button>
            <button className="msave" onClick={addItem}>{t.save}</button>
          </div>
        </div>
      </div>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
