  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{background:#080604;min-height:100%;overscroll-behavior:none;}
    :root{
      /* Gold accent — unchanged identity */
      --gold:#E8B84B;--gold-lt:#FFD166;--gold-dk:#C49A2A;
      /* HIGH CONTRAST: near-black bg, true white text */
      --cream:#FFFFFF;--cdim:#C8B89A;--bg:#080604;
      /* Cards: clearly distinct dark levels */
      --card:#161008;--card2:#1E1509;--bdr:#3A2A0C;
      /* Functional */
      --muted:#7A6545;--grn:#3DD68C;--amb:#F59E0B;--red:#F04F4F;
    }
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--cream);}
    .app{min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 90px;}

    /* HEADER */
    .hdr{padding:18px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:linear-gradient(180deg,#1A1008,transparent);}
    .brand{display:flex;align-items:center;gap:11px;}
    .bico{width:44px;height:44px;background:linear-gradient(135deg,#C49A2A,#FFD166);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #E8B84B55;}
    .bname{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold-lt);letter-spacing:.04em;}
    .bsub{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px;}
    .spill{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--bdr);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--muted);}
    .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .sdot.live{background:var(--grn);box-shadow:0 0 8px var(--grn);}
    .sdot.loading{background:var(--gold);animation:bl .8s infinite;}
    .sdot.fallback{background:var(--amb);}
    .sdot.manual{background:#A78BFA;}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}

    /* SECTIONS */
    .sec{padding:18px 16px 0;}
    .stitle{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}

    /* PRICE HERO CARD */
    .pcard{background:linear-gradient(145deg,#161008,#1E1509 50%,#161008);border:1px solid var(--bdr);border-radius:18px;padding:22px 22px 18px;position:relative;overflow:hidden;}
    .pcard::before{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;background:radial-gradient(circle,#E8B84B22,transparent 60%);pointer-events:none;}
    .price-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    .plbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
    .pbig{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:#FFFFFF;line-height:1;letter-spacing:-.02em;}
    .pbig.main{font-size:46px;}
    .punit{font-size:13px;color:var(--gold-dk);font-weight:600;margin-left:3px;}
    .clock-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .clock{font-size:11px;color:var(--cdim);font-weight:600;}
    .clock span{color:#FFFFFF;}
    .parity-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:2px;}
    .parity-cell{background:#0A070344;border:1px solid var(--bdr);border-radius:10px;padding:10px 8px;text-align:center;}
    .parity-k{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--muted);margin-bottom:4px;}
    .parity-v{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#FFFFFF;}
    .parity-cell.mid .parity-k{color:var(--gold);}
    .parity-cell.mid .parity-v{color:var(--gold-lt);}
    .parity-lbl{font-size:9px;color:var(--muted);font-weight:600;margin-top:2px;}

    /* REFRESH BTN */
    .rbtn{margin-top:16px;width:100%;background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));color:#080604;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 28px #E8B84B40;transition:transform .1s;}
    .rbtn:active{transform:scale(.98);}
    .rbtn:disabled{background:#3D2E12;color:var(--muted);box-shadow:none;cursor:not-allowed;}

    /* OVERRIDE */
    .otoggle{width:100%;background:transparent;border:1px solid var(--bdr);border-radius:12px;color:var(--muted);padding:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;margin-top:10px;}
    .obox{background:var(--card);border:2px solid var(--gold);border-radius:12px;padding:16px;margin-top:8px;}
    .olbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
    .orow{display:flex;gap:10px;}
    .inp{flex:1;background:#0A0703;border:1px solid var(--bdr);color:var(--cream);padding:13px 15px;font-family:'Nunito',sans-serif;font-size:16px;border-radius:10px;outline:none;-webkit-appearance:none;width:100%;transition:border-color .15s;}
    .inp:focus{border-color:var(--gold-dk);}
    .inp::placeholder{color:var(--muted);}
    .sbtn{background:var(--gold-lt);color:#080604;border:none;border-radius:10px;padding:13px 18px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;}
    .clrlnk{text-align:center;margin-top:10px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;}

    /* SCANNER */
    .scard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:20px 18px;}
    .sintro{font-size:14px;color:var(--cdim);font-weight:500;margin-bottom:16px;line-height:1.5;}
    .fg{margin-bottom:13px;}
    .flbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block;}
    .kpills{display:flex;gap:8px;}
    .kpill{flex:1;padding:13px 6px;background:#0D0803;border:1px solid var(--bdr);border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;}
    .kpill.on{background:#2A1C08;border-color:var(--gold-lt);color:var(--gold-lt);}
    .dvdr{height:1px;background:var(--bdr);margin:16px 0;}
    .rrow{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid #3D2E1230;}
    .rrow:last-child{border-bottom:none;}
    .rlbl{font-size:14px;color:var(--muted);font-weight:500;}
    .rval{font-size:16px;font-weight:700;color:#FFFFFF;}
    .vrd{margin-top:16px;border-radius:14px;padding:20px;text-align:center;}
    .vrd.fair{background:#4CAF6C15;border:2px solid #4CAF6C44;}
    .vrd.okay{background:#E8A02015;border:2px solid #E8A02044;}
    .vrd.high{background:#D94F4F15;border:2px solid #D94F4F44;}
    .vrdico{font-size:38px;margin-bottom:8px;}
    .vrdttl{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;margin-bottom:5px;}
    .vrd.fair .vrdttl{color:#4CAF6C;}.vrd.okay .vrdttl{color:#E8A020;}.vrd.high .vrdttl{color:#D94F4F;}
    .vrddesc{font-size:13px;color:var(--cdim);line-height:1.5;font-weight:500;}
    .vrdamt{margin-top:10px;font-size:13px;font-weight:700;color:var(--cdim);}
    .matrix-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:16px 0 10px;}
    .matrix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .matrix-cell{background:#0A0703;border:1px solid var(--bdr);border-radius:10px;padding:12px 8px;text-align:center;}
    .matrix-pct{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
    .matrix-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold-lt);}
    .matrix-note{font-size:10px;color:var(--muted);margin-top:8px;text-align:center;font-weight:500;}
    .sph{text-align:center;padding:28px 0;color:var(--muted);font-size:13px;font-weight:500;}

    /* AUTH GATE */
    .auth-gate{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:40px 24px;text-align:center;margin:0 16px;}
    .auth-ico{font-size:52px;margin-bottom:16px;}
    .auth-ttl{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#FFFFFF;margin-bottom:10px;}
    .auth-desc{font-size:14px;color:var(--muted);font-weight:500;line-height:1.6;margin-bottom:28px;}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:#fff;color:#080604;border:none;border-radius:14px;padding:16px 20px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px #00000040;transition:transform .1s,box-shadow .1s;}
    .google-btn:active{transform:scale(.97);}
    .google-btn:disabled{opacity:.6;cursor:not-allowed;}
    .google-btn svg{flex-shrink:0;}

    /* USER PILL */
    .user-pill{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--bdr);border-radius:20px;padding:5px 12px 5px 6px;cursor:pointer;}
    .user-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
    .user-avatar-placeholder{width:26px;height:26px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#080604;}
    .user-name{font-size:11px;font-weight:700;color:var(--cdim);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* VAULT */
    .vsum{background:linear-gradient(135deg,#1A1008,#221609);border:1px solid var(--bdr);border-radius:18px;padding:18px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .slbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
    .sval{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#FFFFFF;}
    .vcard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;overflow:hidden;}
    .vhdr{padding:16px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
    .vttl{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:#FFFFFF;}
    .vaddbtn{background:var(--gold);color:#080604;border:none;border-radius:8px;padding:9px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
    .vemp{padding:36px 18px;text-align:center;color:var(--muted);font-size:14px;font-weight:500;line-height:1.6;}
    .vempico{font-size:42px;margin-bottom:12px;}
    .vempadd{margin-top:14px;padding:12px 26px;background:var(--gold-lt);color:#080604;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
    .vitem{padding:14px 18px;border-bottom:1px solid #3D2E1230;}
    .vitem:last-child{border-bottom:none;}
    .vitop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
    .viname{font-size:15px;font-weight:700;color:#FFFFFF;margin-bottom:3px;}
    .vikarat{font-size:11px;color:var(--gold-lt);font-weight:700;background:#E8B84B18;border:1px solid #E8B84B44;border-radius:6px;padding:2px 7px;}
    .virow{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);font-weight:500;margin-top:4px;}
    .vival{color:var(--cdim);font-weight:600;}
    .vrm{background:transparent;border:none;color:#5A3C18;font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .15s;}
    .vrm:hover{color:var(--red);}
    .zbadge{display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;}
    .zbadge.due{background:#E8B84B18;color:var(--gold-lt);border:1px solid #E8B84B44;}
    .zbadge.mat{background:#3D2E1244;color:var(--muted);border:1px solid var(--bdr);}
    .signout-btn{width:100%;margin-top:18px;background:transparent;border:1px solid var(--bdr);border-radius:12px;color:var(--muted);padding:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

    /* MODAL */
    .movrl{position:fixed;inset:0;background:#000000AA;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal{background:#161008;border:1px solid var(--bdr);border-radius:24px 24px 0 0;padding:22px 18px 38px;width:100%;max-width:480px;animation:sup .25s ease;}
    @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mttl{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:#FFFFFF;margin-bottom:18px;}
    .mfld{margin-bottom:13px;}
    .mlbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block;}
    .minp{width:100%;background:#0A0703;border:1px solid var(--bdr);color:var(--cream);padding:14px 15px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;transition:border-color .15s;}
    .minp:focus{border-color:var(--gold-dk);}
    .minp::placeholder{color:var(--muted);}
    .mrow{display:flex;gap:10px;}.mrow .mfld{flex:1;}
    .mbtns{display:flex;gap:10px;margin-top:18px;}
    .msave{flex:1;background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));color:#080604;border:none;border-radius:12px;padding:15px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;}
    .mcanc{background:transparent;border:1px solid var(--bdr);color:var(--muted);border-radius:12px;padding:15px 18px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

    /* BOTTOM NAV */
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0C0804F0;border-top:1px solid var(--bdr);backdrop-filter:blur(20px);display:flex;padding:8px 8px 18px;z-index:100;}
    .nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:none;cursor:pointer;padding:7px 4px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:var(--muted);transition:color .15s,background .15s;position:relative;}
    .nbtn.on{color:var(--gold);background:#E8B84B22;}
    .nico{font-size:22px;line-height:1;}
    .nlock{position:absolute;top:4px;right:10px;font-size:9px;}
    select.inp,select.minp{cursor:pointer;}
    select option{background:#080604;color:var(--cream);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── CONSTANTS ──────────────────────────────────────────────────────
const USD_SAR=3.75, TROY_G=31.1035, VAT=1.15, ZAKAT_R=0.025, ZAKAT_D=354;
const PURITY={"24K":1.0,"21K":0.875,"18K":0.75};
const FALLBACK=3300;

const ppg=(spot,k)=>(spot*USD_SAR/TROY_G)*PURITY[k]*VAT;
const fsar=n=>`﷼ ${n.toLocaleString("en-SA",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fsarShort=n=>n.toLocaleString("en-SA",{minimumFractionDigits:2,maximumFractionDigits:2});
const fusd=n=>`$${n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const f1=n=>typeof n==="number"?n.toFixed(1):"—";
const f0=n=>typeof n==="number"?Math.round(n).toLocaleString("en-SA"):"—";

// ── localStorage per UID ──────────────────────────────────────────
const vaultKey=(uid)=>`shishka_vault_${uid}`;
const loadVault=(uid)=>{
  try{return JSON.parse(localStorage.getItem(vaultKey(uid))||"[]");}
  catch{return [];}
};
const saveVault=(uid,data)=>{
  try{localStorage.setItem(vaultKey(uid),JSON.stringify(data));}
  catch(e){console.error("save vault",e);}
};

// ── PRICE FETCH ───────────────────────────────────────────────────
async function tryMetalsLive(){
  const res=await fetch("https://api.metals.live/v1/spot",{signal:AbortSignal.timeout(6000)});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data=await res.json();
  const gold=Array.isArray(data)?data.find(d=>d.gold)?.gold:data?.gold;
  if(gold&&gold>1500&&gold<9000) return parseFloat(gold);
  throw new Error("no gold field");
}
async function tryYahoo(){
  const res=await fetch("https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=1m&range=1d",{signal:AbortSignal.timeout(6000)});
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const d=await res.json();
  const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
  if(p&&p>1500) return parseFloat(p);
  throw new Error("no price");
}

// ── GOLD BAR SVG ──────────────────────────────────────────────────
const GoldBar=()=>(
  <svg width="26" height="20" viewBox="0 0 26 20" fill="none">
    <path d="M4 5 L22 5 L24 15 L2 15 Z" fill="url(#gb1)" stroke="#C49A2A" strokeWidth="0.8"/>
    <path d="M7 2 L19 2 L22 5 L4 5 Z" fill="url(#gb2)" stroke="#C49A2A" strokeWidth="0.8"/>
    <path d="M2 15 L24 15 L24 17 L2 17 Z" fill="#8B6010" stroke="#7A5510" strokeWidth="0.6"/>
    <line x1="8" y1="5" x2="7.5" y2="15" stroke="#E8B84B" strokeWidth="0.5" opacity="0.5"/>
    <line x1="13" y1="5" x2="13" y2="15" stroke="#E8B84B" strokeWidth="0.5" opacity="0.5"/>
    <line x1="18" y1="5" x2="18.5" y2="15" stroke="#E8B84B" strokeWidth="0.5" opacity="0.5"/>
    <defs>
      <linearGradient id="gb1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#FFD166"/><stop offset="100%" stopColor="#C49A2A"/>
      </linearGradient>
      <linearGradient id="gb2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#FFD980"/><stop offset="100%" stopColor="#E8B84B"/>
      </linearGradient>
    </defs>
  </svg>
);

// ── GOOGLE LOGO SVG ───────────────────────────────────────────────
const GoogleLogo=()=>(
  <svg width="20" height="20" viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
  </svg>
);

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("main");
  const [moreTab,setMoreTab]=useState("vault");

  // Price state
  const [spot,setSpot]=useState(null);
  const [status,setStatus]=useState("loading");
  const [source,setSource]=useState(null);
  const [clockStr,setClockStr]=useState("");
  const [showOvr,setShowOvr]=useState(false);
  const [ovrIn,setOvrIn]=useState("");

  // Scanner state
  const [scanK,setScanK]=useState("21K");
  const [scanP,setScanP]=useState("");
  const [scanG,setScanG]=useState("");

  // Auth state
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [signingIn,setSigningIn]=useState(false);
  const [fbReady,setFbReady]=useState(!!window._firebaseReady);

  // Vault state (loaded per user)
  const [vault,setVaultState]=useState([]);
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({name:"",karat:"21K",grams:"",date:"",paid:""});
  const clockRef=useRef(null);

  // Vault write helper — persists to localStorage
  const setVault=(updater)=>{
    setVaultState(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      if(user?.uid) saveVault(user.uid,next);
      return next;
    });
  };

  // Wait for Firebase SDK module to load
  useEffect(()=>{
    if(window._firebaseReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("firebase-ready",h);
    return()=>window.removeEventListener("firebase-ready",h);
  },[]);

  // Auth listener — once Firebase ready
  useEffect(()=>{
    if(!fbReady||!window._firebaseOnAuth) return;
    const unsub=window._firebaseOnAuth((u)=>{
      setUser(u);
      setAuthLoading(false);
      if(u?.uid){
        setVaultState(loadVault(u.uid));
      } else {
        setVaultState([]);
      }
    });
    return unsub;
  },[fbReady]);

  // Clock
  useEffect(()=>{
    const tick=()=>{
      const now=new Date();
      setClockStr(now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    };
    tick();
    clockRef.current=setInterval(tick,1000);
    return()=>clearInterval(clockRef.current);
  },[]);

  // Price fetch
  const fetchPrice=useCallback(async()=>{
    setStatus("loading");
    try{const p=await tryMetalsLive();setSpot(p);setStatus("live");setSource("Live Price");return;}
    catch(e){console.log("metals.live:",e.message);}
    try{const p=await tryYahoo();setSpot(p);setStatus("live");setSource("Live Price");return;}
    catch(e){console.log("Yahoo:",e.message);}
    setStatus("fallback");setSource("Estimated");
  },[]);

  useEffect(()=>{fetchPrice();},[fetchPrice]);

  const eff=spot||FALLBACK;
  const today=new Date();

  const applyOvr=()=>{
    const v=parseFloat(ovrIn);
    if(isNaN(v)||v<1000||v>9999)return;
    setSpot(v);setStatus("manual");setSource("Manual");setShowOvr(false);
  };

  // Scanner
  const scanPN=parseFloat(scanP), scanGN=parseFloat(scanG);
  const hasOffer=!isNaN(scanPN)&&scanPN>0;
  const hasWeight=!isNaN(scanGN)&&scanGN>0;
  const fairV=hasWeight&&hasOffer?ppg(eff,scanK)*scanGN:null;
  const mAmt=fairV!=null?scanPN-fairV:null;
  const mPct=(fairV!=null&&fairV>0)?((scanPN-fairV)/fairV)*100:null;
  const vrd=mPct===null?null:mPct<=5?"fair":mPct<=18?"okay":"high";

  // Vault calcs
  const vc=vault.map(p=>{
    const fmv=ppg(eff,p.karat)*p.grams;
    const days=Math.floor((today-new Date(p.date))/86400000);
    const pnl=fmv-p.paid;
    return{...p,fmv,days,pnl,eli:days>=ZAKAT_D};
  });
  const tFmv=vc.reduce((s,p)=>s+p.fmv,0);
  const tPnl=vc.reduce((s,p)=>s+p.pnl,0);
  const zDue=vc.filter(p=>p.eli).reduce((s,p)=>s+p.fmv,0)*ZAKAT_R;

  const addItem=()=>{
    const{name,karat,grams,date,paid}=form;
    if(!name||!grams||!date||!paid)return;
    setVault(v=>[...v,{name,karat,grams:parseFloat(grams),date,paid:parseFloat(paid)}]);
    setForm({name:"",karat:"21K",grams:"",date:"",paid:""});setShowModal(false);
  };

  const handleSignIn=async()=>{
    if(!window._firebaseSignIn)return;
    setSigningIn(true);
    try{await window._firebaseSignIn();}
    catch(e){console.error("sign in",e);}
    finally{setSigningIn(false);}
  };

  const handleSignOut=async()=>{
    if(!window._firebaseSignOut)return;
    await window._firebaseSignOut();
    setVaultState([]);
  };

  // ── AUTH GATE component ────────────────────────────────────────
  const AuthGate=({feature})=>(
    <div className="sec" style={{paddingTop:32}}>
      <div className="auth-gate">
        <div className="auth-ico">🔐</div>
        <div className="auth-ttl">Sign In Required</div>
        <div className="auth-desc">
          Your {feature} is private and personal.<br/>
          Sign in with Google to access it securely.
          Your data stays on this device, linked to your account.
        </div>
        <button className="google-btn" onClick={handleSignIn} disabled={signingIn||!fbReady}>
          <GoogleLogo/>
          {signingIn?"Signing in…":!fbReady?"Loading…":"Sign in with Google"}
        </button>
        {!fbReady&&<p style={{marginTop:12,fontSize:11,color:"var(--muted)",textAlign:"center"}}>
          ⚠️ Firebase not configured yet. Add your Firebase config to the HTML file.
        </p>}
      </div>
    </div>
  );

  // ── User pill for header ───────────────────────────────────────
  const UserPill=()=>{
    if(authLoading) return null;
    if(!user) return null;
    const name=user.displayName?.split(" ")[0]||"User";
    return(
      <button className="user-pill" onClick={handleSignOut} title="Tap to sign out">
        {user.photoURL
          ?<img className="user-avatar" src={user.photoURL} alt={name}/>
          :<div className="user-avatar-placeholder">{name[0].toUpperCase()}</div>
        }
        <span className="user-name">{name}</span>
      </button>
    );
  };

  return(
    <div className="app">

      {/* HEADER */}
      <div className="hdr">
        <div className="brand">
          <div className="bico"><GoldBar/></div>
          <div>
            <div className="bname">Shishka Gold</div>
            <div className="bsub">Saudi Gold Price Calculator</div>
          </div>
        </div>
        {user
          ?<UserPill/>
          :<div className="spill">
            <div className={`sdot ${status}`}/>
            <span>{status==="loading"?"Updating…":source}</span>
          </div>
        }
      </div>

      {/* ── MAIN PAGE: PRICE + SCANNER ── */}
      {page==="main"&&<>
        <div className="sec">
          <div className="pcard">
            <div className="clock-row">
              <span className="clock">Updated: <span>{clockStr}</span></span>
              {status==="fallback"&&<span style={{fontSize:10,color:"var(--amb)",fontWeight:700}}>⚠ Estimated</span>}
              {status==="manual"&&<span style={{fontSize:10,color:"#A78BFA",fontWeight:700}}>✏ Manual</span>}
            </div>
            <div className="price-row">
              <div>
                <div className="plbl">Spot (USD)</div>
                <div className="pbig main">
                  {status==="loading"?<span style={{fontSize:26,color:"var(--muted)"}}>…</span>
                  :<span>{fusd(eff)}<span className="punit">/ oz</span></span>}
                </div>
              </div>
              <div>
                <div className="plbl">Spot (SAR)</div>
                <div className="pbig" style={{fontSize:32}}>
                  {status==="loading"?<span style={{fontSize:22,color:"var(--muted)"}}>…</span>
                  :<span>{fsarShort(eff*USD_SAR)}<span className="punit">/ oz</span></span>}
                </div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div className="plbl" style={{marginBottom:8}}>Gram Parity (SAR · incl. 15% VAT)</div>
              <div className="parity-row">
                {["24K","21K","18K"].map((k,i)=>(
                  <div key={k} className={`parity-cell${i===1?" mid":""}`}>
                    <div className="parity-k">{k}</div>
                    <div className="parity-v">{fsarShort(ppg(eff,k))}</div>
                    <div className="parity-lbl">per gram</div>
                  </div>
                ))}
              </div>
            </div>
            <button className="rbtn" onClick={fetchPrice} disabled={status==="loading"}>
              <span>{status==="loading"?"⏳":"🔄"}</span>
              {status==="loading"?"Getting latest price…":"Refresh Gold Price"}
            </button>
          </div>
        </div>
        <div className="sec" style={{paddingBottom:8}}>
          <button className="otoggle" onClick={()=>setShowOvr(s=>!s)}>
            {showOvr?"▲ Hide manual entry":"✏️  Enter price manually"}
          </button>
          {showOvr&&<div className="obox">
            <div className="olbl">USD price per ounce</div>
            <div className="orow">
              <input className="inp" type="number" inputMode="decimal"
                placeholder="e.g. 3280" value={ovrIn}
                onChange={e=>setOvrIn(e.target.value)}/>
              <button className="sbtn" onClick={applyOvr}>Set</button>
            </div>
            {status==="manual"&&<div className="clrlnk"
              onClick={()=>{setSpot(null);setStatus("fallback");setSource("Estimated");setOvrIn("");setShowOvr(false);}}>
              Clear — return to automatic
            </div>}
          </div>}
        </div>


        {/* ── THE SCANNER ── */}
        <div className="sec" style={{paddingBottom:8}}>
          <div className="stitle" style={{marginBottom:14}}>The Scanner</div>
          <div className="scard">
          <div className="fg">
            <span className="flbl">Gold Type</span>
            <div className="kpills">
              {["24K","21K","18K"].map(k=>(
                <button key={k} className={`kpill${scanK===k?" on":""}`}
                  onClick={()=>setScanK(k)}>{k}</button>
              ))}
            </div>
          </div>
          <div className="fg">
            <label className="flbl">Weight in Grams</label>
            <input className="inp" type="number" inputMode="decimal"
              placeholder="e.g. 15.5" value={scanG}
              onChange={e=>setScanG(e.target.value)} style={{width:"100%"}}/>
          </div>
          <div className="fg">
            <label className="flbl">Dealer's Total Price (SAR ﷼) — optional</label>
            <input className="inp" type="number" inputMode="decimal"
              placeholder="e.g. 8500" value={scanP}
              onChange={e=>setScanP(e.target.value)} style={{width:"100%"}}/>
          </div>

          {hasWeight?<>
            <div className="dvdr"/>
            {/* Quote De-Layering */}
            <div className="matrix-lbl" style={{marginTop:0}}>Quote De-Layering</div>
            <div className="rrow">
              <span className="rlbl">Base Price (incl. VAT)</span>
              <span className="rval" style={{color:"var(--gold-lt)"}}>{fsar(ppg(eff,scanK)*scanGN)}</span>
            </div>
            {hasOffer&&mAmt!=null&&<>
              <div className="rrow">
                <span className="rlbl">Markup (Workmanship)</span>
                <span className="rval" style={{color:mAmt>0?"var(--red)":"var(--grn)"}}>
                  {mAmt>=0?"+":""}{fsar(mAmt)}
                </span>
              </div>
              <div className="rrow">
                <span className="rlbl">Effective Margin</span>
                <span className="rval" style={{color:mPct>18?"var(--red)":mPct>5?"var(--amb)":"var(--grn)"}}>
                  {mPct>=0?"+":""}{f1(mPct)}%
                </span>
              </div>
            </>}

            {/* Sensitivity Matrix */}
            <div className="matrix-lbl">Sensitivity Matrix (Target Offer)</div>
            <div className="matrix-grid">
              {[10,20,30].map(m=>(
                <div key={m} className="matrix-cell">
                  <div className="matrix-pct">{m}% Margin</div>
                  <div className="matrix-val">﷼ {f0(ppg(eff,scanK)*scanGN*(1+m/100))}</div>
                </div>
              ))}
            </div>
            <div className="matrix-note">* Includes 15% statutory VAT</div>

            {/* Verdict — only if dealer price entered */}
            {hasOffer&&vrd&&<div className={`vrd ${vrd}`} style={{marginTop:16}}>
              <div className="vrdico">{vrd==="fair"?"✅":vrd==="okay"?"⚠️":"❌"}</div>
              <div className="vrdttl">{vrd==="fair"?"Fair Price":vrd==="okay"?"A Bit High":"Overpriced"}</div>
              <div className="vrddesc">
                {vrd==="fair"?"This is a reasonable price. The extra charge is within normal range."
                :vrd==="okay"?`The dealer is charging ${f1(mPct)}% above gold value. You may want to negotiate.`
                :`The dealer is charging ${f1(mPct)}% above gold value. This is too high — try another dealer.`}
              </div>
              {mAmt!=null&&mAmt>0&&<div className="vrdamt">You are paying {fsar(mAmt)} extra in workmanship</div>}
            </div>}
          </>:<div className="sph">Enter weight above to see target prices</div>}
          </div>
        </div>
      </>}

      {/* ── MORE PAGE ── */}
      {page==="more"&&<div style={{paddingTop:18}}>

        {/* Sub-tab switcher */}
        <div style={{display:"flex",gap:10,padding:"0 16px",marginBottom:18}}>
          {[["vault","📦 My Gold"],["zakat","🌙 Zakat"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setMoreTab(id)} style={{
              flex:1,padding:"13px 8px",
              background:moreTab===id?"#2A1C08":"var(--card)",
              border:`1px solid ${moreTab===id?"var(--gold)":"var(--bdr)"}`,
              borderRadius:12,fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:700,
              color:moreTab===id?"var(--gold-lt)":"var(--muted)",cursor:"pointer"
            }}>{lbl}</button>
          ))}
        </div>

        {/* VAULT — gated */}
        {moreTab==="vault"&&<>
          {!user
            ?<AuthGate feature="Vault"/>
            :<div className="sec" style={{paddingTop:0}}>
              {vault.length>0&&<div className="vsum">
                <div><div className="slbl">Total Value</div><div className="sval">{fsar(tFmv)}</div></div>
                <div>
                  <div className="slbl">{tPnl>=0?"Profit":"Loss"}</div>
                  <div className="sval" style={{color:tPnl>=0?"var(--grn)":"var(--red)"}}>{fsar(Math.abs(tPnl))}</div>
                </div>
              </div>}
              <div className="vcard">
                <div className="vhdr">
                  <div className="vttl">Gold Holdings</div>
                  <button className="vaddbtn" onClick={()=>setShowModal(true)}>+ Add</button>
                </div>
                {vault.length===0
                  ?<div className="vemp">
                    <div className="vempico">🏺</div>
                    <div style={{color:"var(--cdim)",fontWeight:600}}>Track your gold here</div>
                    <div style={{marginTop:6}}>Add a piece to see its current value.</div>
                    <button className="vempadd" onClick={()=>setShowModal(true)}>Add My First Item</button>
                  </div>
                  :vc.map((p,i)=>(
                    <div key={i} className="vitem">
                      <div className="vitop">
                        <div><div className="viname">{p.name}</div><span className="vikarat">{p.karat} · {p.grams}g</span></div>
                        <button className="vrm" onClick={()=>setVault(v=>v.filter((_,j)=>j!==i))}>×</button>
                      </div>
                      <div className="virow"><span>Current Value</span><span className="vival" style={{color:"var(--gold-lt)"}}>{fsar(p.fmv)}</span></div>
                      <div className="virow">
                        <span>{p.pnl>=0?"Profit":"Loss"}</span>
                        <span className="vival" style={{color:p.pnl>=0?"var(--grn)":"var(--red)"}}>{fsar(Math.abs(p.pnl))}</span>
                      </div>
                    </div>
                  ))
                }
              </div>
              <button className="signout-btn" onClick={handleSignOut}>
                🚪 Sign out of Vault
              </button>
            </div>
          }
        </>}

        {/* ZAKAT — gated */}
        {moreTab==="zakat"&&<>
          {!user
            ?<AuthGate feature="Zakat Audit"/>
            :<div className="sec" style={{paddingTop:0}}>
              <div className="vcard">
                <div className="vhdr"><div className="vttl">Zakat Status</div></div>
                {vault.length===0
                  ?<div className="vemp">
                    <div className="vempico">🌙</div>
                    <div style={{color:"var(--cdim)",fontWeight:600}}>No gold added yet</div>
                    <div style={{marginTop:6}}>Add items in My Gold first.</div>
                    <button className="vempadd" onClick={()=>setMoreTab("vault")}>Go to My Gold</button>
                  </div>
                  :<>
                    {zDue>0&&<div style={{margin:"16px 18px 4px",padding:16,background:"#E8B84B14",border:"1px solid #E8B84B33",borderRadius:12,textAlign:"center"}}>
                      <div style={{fontSize:10,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>Total Zakat Due</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:34,fontWeight:700,color:"var(--gold-lt)"}}>{fsar(zDue)}</div>
                      <div style={{fontSize:12,color:"var(--muted)",marginTop:4,fontWeight:500}}>2.5% of eligible holdings · AAOIFI standard · {ZAKAT_D} day Hijri cycle</div>
                    </div>}
                    {vc.map((p,i)=>(
                      <div key={i} className="vitem">
                        <div className="vitop"><div><div className="viname">{p.name}</div><span className="vikarat">{p.karat} · {p.grams}g</span></div></div>
                        <div className="virow"><span>Days Held</span><span className="vival">{p.days} days</span></div>
                        <div className="virow"><span>Current FMV</span><span className="vival">{fsar(p.fmv)}</span></div>
                        <div>
                          {p.eli
                            ?<span className="zbadge due">🌙 Zakat due — {fsar(p.fmv*ZAKAT_R)}</span>
                            :<span className="zbadge mat">⏳ Eligible in {ZAKAT_D-p.days} days</span>
                          }
                        </div>
                      </div>
                    ))}
                  </>
                }
              </div>
            </div>
          }
        </>}
      </div>}

      {/* BOTTOM NAV */}
      <div className="bnav">
        {[
          ["main","💰","Price & Scanner",false],
          ["more","⋯","Vault & Zakat",!user]
        ].map(([id,ico,lbl,locked])=>(
          <button key={id} className={`nbtn${page===id?" on":""}`} onClick={()=>setPage(id)}>
            <span className="nico">{ico}</span>
            <span>{lbl}</span>
            {locked&&<span className="nlock">🔒</span>}
          </button>
        ))}
      </div>

      {/* ADD ITEM MODAL */}
      {showModal&&<div className="movrl" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
        <div className="modal">
          <div className="mttl">Add a Gold Item</div>
          <div className="mfld">
            <label className="mlbl">Name</label>
            <input className="minp" type="text" placeholder="e.g. Gold Bracelet"
              value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          </div>
          <div className="mrow">
            <div className="mfld">
              <label className="mlbl">Gold Type</label>
              <select className="minp" value={form.karat} onChange={e=>setForm(f=>({...f,karat:e.target.value}))}>
                <option>24K</option><option>21K</option><option>18K</option>
              </select>
            </div>
            <div className="mfld">
              <label className="mlbl">Weight (g)</label>
              <input className="minp" type="number" inputMode="decimal" placeholder="15.5"
                value={form.grams} onChange={e=>setForm(f=>({...f,grams:e.target.value}))}/>
            </div>
          </div>
          <div className="mfld">
            <label className="mlbl">Date Purchased</label>
            <input className="minp" type="date" value={form.date}
              onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
          </div>
          <div className="mfld">
            <label className="mlbl">Total Paid (SAR)</label>
            <input className="minp" type="number" inputMode="decimal" placeholder="e.g. 4800"
              value={form.paid} onChange={e=>setForm(f=>({...f,paid:e.target.value}))}/>
          </div>
          <div className="mbtns">
            <button className="mcanc" onClick={()=>setShowModal(false)}>Cancel</button>
            <button className="msave" onClick={addItem}>Save Item</button>
          </div>
        </div>
      </div>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
